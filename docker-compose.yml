services:
  frontend:
    build: ./mamacare
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./backend/src
          target: /app/src

  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mamacare
      POSTGRES_USER: mamacare
      POSTGRES_PASSWORD: mamacare_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mamacare"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
